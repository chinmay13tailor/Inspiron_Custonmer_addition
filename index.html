<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Machine Configuration</title>

<style>

body{
  font-family:"Segoe UI",sans-serif;
  background:#eef2f7;
  padding:20px;
}

/* CARD */

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  width:100%;
  height:100%;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

.title{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
  color:#1e293b;
}

/* INPUT GROUP */

.input-group{
  margin-bottom:14px;
}

.label{
  font-size:12px;
  color:#64748b;
  margin-bottom:5px;
}

input{
  width:100%;
  padding:10px 12px;
  border:1px solid #d1d5db;
  border-radius:10px;
  font-size:13px;
  transition:0.2s;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* BUTTON */

.submit-btn{
  margin-top:12px;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.submit-btn:hover{
  box-shadow:0 8px 20px rgba(37,99,235,0.4);
  transform:translateY(-1px);
}

/* POPUP */

.popup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:22px;
  border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  width:320px;
  animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translate(-50%,-60%);}
  to{opacity:1; transform:translate(-50%,-50%);}
}

.popup h4{
  margin-bottom:10px;
}

.popup p{
  font-size:13px;
  color:#334155;
  line-height:1.5;
}

.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:14px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.confirm{
  flex:1;
  background:#16a34a;
  color:white;
}

.cancel{
  flex:1;
  background:#ef4444;
  color:white;
}

/* OPTIONAL: CENTER CARD */

.wrapper{
  display:flex;
  justify-content:flex-start; /* change to center if needed */
}

</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<div class="title">Machine Configuration</div>

<div class="input-group">
  <div class="label">Customer Name</div>
  <input id="customer" placeholder="Enter customer name">
</div>

<div class="input-group">
  <div class="label">Machine ID</div>
  <input id="machine" placeholder="Enter machine ID">
</div>

<div class="input-group">
  <div class="label">Device ID</div>
  <input id="device" placeholder="Enter device ID">
</div>

<button class="submit-btn" onclick="openConfirm()">Submit</button>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">

<h4>Confirm Details</h4>

<p id="popupText"></p>

<div class="popup-buttons">
  <button class="confirm" onclick="saveData()">Confirm</button>
  <button class="cancel" onclick="closePopup()">Cancel</button>
</div>

</div>

<script>

// 🔧 CONFIG
const API="https://plantwiz.pimateck.in/api";
const JWT=new URLSearchParams(location.search).get("token")||"";

// 🔥 FIXED DEVICE ID (logging device)
const LOG_DEVICE_ID = "befc6bf0-42df-11f1-b25a-9b1cf0871243";

// 🧩 OPEN POPUP
function openConfirm(){

  const customer = document.getElementById("customer").value.trim();
  const machine = document.getElementById("machine").value.trim();
  const device = document.getElementById("device").value.trim();

  if(!customer || !machine || !device){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("popupText").innerHTML = `
    <b>Customer:</b> ${customer}<br>
    <b>Machine:</b> ${machine}<br>
    <b>Device:</b> ${device}
  `;

  document.getElementById("popup").style.display="block";
}

// ❌ CLOSE POPUP
function closePopup(){
  document.getElementById("popup").style.display="none";
}

// 💾 SAVE DATA
async function saveData(){

  const customer = document.getElementById("customer").value.trim();
  const machine = document.getElementById("machine").value.trim();
  const device = document.getElementById("device").value.trim();

  const machineObj = {
    customer: customer,
    machine: machine,
    device_id: device
  };

  const payload = [{
    ts: Date.now(),
    values:{
      Machine_ID: JSON.stringify(machineObj)
    }
  }];

  try{

    await fetch(`${API}/plugins/telemetry/DEVICE/${LOG_DEVICE_ID}/timeseries/ANY`,{

      method:"POST",

      headers:{
        "X-Authorization":"Bearer "+JWT,
        "Content-Type":"application/json"
      },

      body:JSON.stringify(payload)

    });

    alert("Saved Successfully ✅");

    closePopup();

    document.getElementById("customer").value="";
    document.getElementById("machine").value="";
    document.getElementById("device").value="";

  }catch(err){
    console.error(err);
    alert("Error saving data ❌");
  }

}

</script>

</body>
</html>
